name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags-ignore:
      - "*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-installers:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            platform: macos-latest
            build_args: "--bundles dmg --target universal-apple-darwin --ci"
            artifact_name: ziply-macos-dmg
            artifact_dir: target/universal-apple-darwin/release/bundle/dmg
            artifact_extension: dmg
            artifact_path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - name: Windows Setup EXE
            platform: windows-latest
            build_args: "--bundles nsis --ci --no-sign"
            artifact_name: ziply-windows-setup
            artifact_dir: target/release/bundle/nsis
            artifact_extension: exe
            artifact_path: target/release/bundle/nsis/*.exe
          - name: Linux DEB
            platform: ubuntu-22.04
            build_args: "--bundles deb --ci --no-sign"
            artifact_name: ziply-linux-deb
            artifact_dir: target/release/bundle/deb
            artifact_extension: deb
            artifact_path: target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Preflight macOS signing and notarization
        if: matrix.platform == 'macos-latest'
        id: macos_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          missing=()
          for var in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_API_KEY APPLE_API_ISSUER APPLE_API_KEY_BASE64; do
            if [ -z "${!var}" ]; then
              missing+=("$var")
            fi
          done

          if [ "${#missing[@]}" -ne 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing/notarization secrets missing: ${missing[*]}. Falling back to unsigned DMG."
            exit 0
          fi

          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          APPLE_API_KEY_BASE64="$APPLE_API_KEY_BASE64" APPLE_API_KEY_PATH="$api_key_path" python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["APPLE_API_KEY_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))'
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with universal Apple targets
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: npm ci

      - name: Check version consistency
        run: bash scripts/check-version-consistency.sh

      - name: Build installer
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          build_args="${{ matrix.build_args }}"
          if [ "${{ matrix.platform }}" = "macos-latest" ] && [ "${{ steps.macos_signing.outputs.ready }}" != "true" ]; then
            build_args="$build_args --no-sign"
          fi

          npm run build -- $build_args

      - name: Show bundle outputs
        if: always()
        shell: bash
        run: find target -type f | sort | grep '/bundle/' || true

      - name: Staple and verify macOS artifacts
        if: matrix.platform == 'macos-latest' && steps.macos_signing.outputs.ready == 'true'
        shell: bash
        run: |
          APP_PATH="$(find target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n 1)"
          DMG_PATH="$(find target/universal-apple-darwin/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)"

          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Signed app bundle not found."
            exit 1
          fi

          if [ -z "$DMG_PATH" ] || [ ! -f "$DMG_PATH" ]; then
            echo "Signed DMG not found."
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          codesign -dv --verbose=4 "$APP_PATH"
          spctl -a -t exec -vv "$APP_PATH"

      - name: Clean up macOS notarization key
        if: matrix.platform == 'macos-latest' && always()
        shell: bash
        run: |
          if [ -n "${APPLE_API_KEY_PATH:-}" ]; then
            rm -f "$APPLE_API_KEY_PATH"
          fi

      - name: Verify installer artifact
        shell: bash
        env:
          ARTIFACT_DIR: ${{ matrix.artifact_dir }}
          ARTIFACT_EXTENSION: ${{ matrix.artifact_extension }}
        run: |
          if [ ! -d "$ARTIFACT_DIR" ]; then
            echo "Expected artifact directory does not exist: $ARTIFACT_DIR"
            exit 1
          fi

          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(find "$ARTIFACT_DIR" -maxdepth 1 -type f -name "*.$ARTIFACT_EXTENSION" | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .$ARTIFACT_EXTENSION artifacts found in $ARTIFACT_DIR"
            exit 1
          fi

          printf 'Verified installer artifacts:\n'
          for file in "${files[@]}"; do
            if [ ! -s "$file" ]; then
              echo "Artifact is empty: $file"
              exit 1
            fi

            size_bytes="$(wc -c < "$file" | tr -d ' ')"
            checksum="$(sha256sum "$file" | awk '{print $1}')"
            printf ' - %s (%s bytes) sha256=%s\n' "$file" "$size_bytes" "$checksum"
          done

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  tag-version:
    name: Tag successful main build
    runs-on: ubuntu-22.04
    needs: build-installers
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      created: ${{ steps.tag_result.outputs.created }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read and validate app version
        id: version
        shell: bash
        run: |
          VERSION="$(bash scripts/check-version-consistency.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version tag already exists
        id: tag_check
        shell: bash
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push version tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Report existing version tag
        if: steps.tag_check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping auto-tag."

      - name: Record tag creation result
        id: tag_result
        shell: bash
        run: |
          if [ "${{ steps.tag_check.outputs.exists }}" = "false" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - build-installers
      - tag-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.tag-version.outputs.tag != ''
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v6
        with:
          name: ziply-macos-dmg
          path: release-assets/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v6
        with:
          name: ziply-windows-setup
          path: release-assets/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v6
        with:
          name: ziply-linux-deb
          path: release-assets/linux

      - name: Verify downloaded release assets
        shell: bash
        run: |
          verify_one() {
            local label="$1"
            local directory="$2"
            local extension="$3"
            local files=()
            local file
            local size_bytes

            if [ ! -d "$directory" ]; then
              echo "Missing release asset directory for $label: $directory"
              exit 1
            fi

            while IFS= read -r file; do
              files+=("$file")
            done < <(find "$directory" -maxdepth 1 -type f -name "*.$extension" | sort)
            if [ "${#files[@]}" -eq 0 ]; then
              echo "No .$extension release assets found for $label in $directory"
              exit 1
            fi

            printf '%s assets:\n' "$label"
            for file in "${files[@]}"; do
              if [ ! -s "$file" ]; then
                echo "Downloaded release asset is empty: $file"
                exit 1
              fi

              size_bytes="$(wc -c < "$file" | tr -d ' ')"
              printf ' - %s (%s bytes)\n' "$file" "$size_bytes"
            done
          }

          verify_one "macOS" "release-assets/macos" "dmg"
          verify_one "Windows" "release-assets/windows" "exe"
          verify_one "Linux" "release-assets/linux" "deb"

      - name: Generate checksums
        shell: bash
        run: |
          find release-assets -type f | sort > /tmp/release-files.txt
          while IFS= read -r file; do
            sha256sum "$file"
          done < /tmp/release-files.txt > release-assets/SHA256SUMS.txt
          cat release-assets/SHA256SUMS.txt

      - name: Ensure GitHub CLI is available
        shell: bash
        run: |
          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y gh
          gh --version

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.tag-version.outputs.tag }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              release-assets/macos/* \
              release-assets/windows/* \
              release-assets/linux/* \
              release-assets/SHA256SUMS.txt \
              --clobber
            exit 0
          fi

          gh release create "$TAG_NAME" \
            release-assets/macos/* \
            release-assets/windows/* \
            release-assets/linux/* \
            release-assets/SHA256SUMS.txt \
            --title "Ziply $TAG_NAME" \
            --generate-notes

  publish-homebrew-tap:
    name: Publish Homebrew tap
    runs-on: ubuntu-22.04
    needs:
      - build-installers
      - publish-release
      - tag-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.tag-version.outputs.tag != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Preflight secret check
        id: preflight
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not configured. Skipping Homebrew tap publish."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Download macOS artifact
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ziply-macos-dmg
          path: release-assets/macos

      - name: Publish Homebrew tap
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH }}
          TAG_NAME: ${{ needs.tag-version.outputs.tag }}
          VERSION: ${{ needs.tag-version.outputs.version }}
        run: |
          chmod +x scripts/publish-homebrew-tap.sh scripts/render-homebrew-cask.sh
          export DMG_PATH="$(find release-assets/macos -type f -name '*.dmg' | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "No .dmg artifact found."
            exit 1
          fi

          scripts/publish-homebrew-tap.sh

      - name: Skip notice
        if: steps.preflight.outputs.ready != 'true'
        run: echo "Homebrew tap publish skipped because HOMEBREW_TAP_TOKEN is not configured."

  publish-apt-repo:
    name: Publish APT repo to GitHub Pages
    runs-on: ubuntu-22.04
    needs:
      - build-installers
      - publish-release
      - tag-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.tag-version.outputs.tag != ''
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Preflight secret check
        id: preflight
        shell: bash
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$APT_GPG_PRIVATE_KEY" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "APT_GPG_PRIVATE_KEY is not configured. Skipping APT repo publish."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifact
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/download-artifact@v6
        with:
          name: ziply-linux-deb
          path: release-assets/linux

      - name: Install APT repo build dependencies
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Build APT repository
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_REPO_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/apt
          APT_ORIGIN: Ziply
          APT_LABEL: Ziply
        run: |
          chmod +x scripts/build-apt-repo.sh
          DEB_PATH="$(find release-assets/linux -type f -name '*.deb' | head -n 1)"
          if [ -z "$DEB_PATH" ]; then
            echo "No .deb artifact found."
            exit 1
          fi

          scripts/build-apt-repo.sh "$DEB_PATH" pages-site/apt

      - name: Add root index
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          cat > pages-site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Ziply Packages</title>
            </head>
            <body>
              <h1>Ziply Packages</h1>
              <ul>
                <li><a href="./apt/">APT repository</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Configure Pages
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-site

      - name: Deploy to GitHub Pages
        if: steps.preflight.outputs.ready == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Skip notice
        if: steps.preflight.outputs.ready != 'true'
        run: echo "APT repo publish skipped because signing secrets are not configured."
